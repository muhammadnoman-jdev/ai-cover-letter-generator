<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Verification — Cover Letter AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="d-flex align-items-center justify-content-center" style="min-height:100vh; padding:20px">
    <div class="glass-strong p-5 text-center" style="max-width:460px; width:100%">
        <div style="font-size:3rem">❌</div>
        <h3 class="page-title mt-3">Verification Failed</h3>
        <div class="alert-glass-danger mt-3" th:text="${error}"></div>
        <a th:href="@{/register}" class="btn-primary-glass mt-3">Register Again</a>
    </div>
</div>
</body>
</html>
