<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Interview Prep — Cover Letter AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="glass-nav">
    <a href="/dashboard" class="brand">✨ Cover Letter AI</a>
    <div class="nav-links">
        <a th:href="@{/cover-letters/new}">Cover Letter</a>
        <a th:href="@{/tools/resume-summary}">Resume Summary</a>
        <a th:href="@{/cover-letters/history}">History</a>
        <a th:href="@{/profile}">Profile</a>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn-danger-glass"
                    style="padding:6px 18px; font-size:0.85rem">Logout</button>
        </form>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="glass p-5">
                <h2 class="page-title">Interview Question Generator</h2>
                <p class="page-subtitle">Get tailored technical interview questions for any role</p>

                <form th:action="@{/tools/interview-questions}" method="post">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label-glass">Job Title</label>
                            <input type="text" name="jobTitle"
                                   class="form-control form-control-glass"
                                   placeholder="Java Backend Developer"
                                   th:value="${jobTitle}"/>
                        </div>
                        <div class="col-12">
                            <label class="form-label-glass">Skills to Focus On</label>
                            <textarea name="skills" class="form-control form-control-glass" rows="3"
                                      placeholder="Spring Boot, REST APIs, MySQL, Spring Security, Microservices..."
                                      th:text="${skills}"></textarea>
                        </div>
                        <div class="col-12 mt-2">
                            <button type="submit" class="btn-primary-glass w-100 text-center"
                                    style="padding:14px; font-size:1rem; border-radius:14px">
                                🎯 Generate Interview Questions
                            </button>
                        </div>
                    </div>
                </form>

                <!-- Result -->
                <div th:if="${questions}" class="mt-4">
                    <div style="height:1px; background:rgba(255,255,255,0.1); margin-bottom:24px"></div>
                    <h5 style="color:#a78bfa; margin-bottom:16px">
                        🎯 Interview Questions for <span th:text="${jobTitle}"></span>
                    </h5>
                    <div class="glass p-4" style="border-radius:14px">
                        <pre style="color:#e2e8f0; line-height:2; font-size:0.9rem;
                                    white-space:pre-wrap; font-family:'Segoe UI', sans-serif"
                             th:text="${questions}"></pre>
                    </div>
                    <div class="mt-3">
                        <button onclick="navigator.clipboard.writeText(document.querySelector('pre').innerText)
                                .then(() => alert('Copied!'))"
                                class="btn-success-glass"
                                style="font-size:0.85rem; padding:8px 18px">
                            📋 Copy All Questions
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
