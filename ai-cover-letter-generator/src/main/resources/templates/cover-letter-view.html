<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cover Letter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
<div class="container mt-4" style="max-width: 700px">
    <h3 th:text="${coverLetter.title}">Cover Letter Title</h3>
    <p class="text-muted">
        <span th:text="${coverLetter.jobTitle}"></span> at
        <span th:text="${coverLetter.companyName}"></span>
    </p>
    <hr/>
    <pre class="bg-white p-4 border rounded" th:text="${coverLetter.generatedContent}"></pre>
    <div class="mt-3">
        <a th:href="@{/cover-letters/history}" class="btn btn-secondary">Back to History</a>
        <a th:href="@{/cover-letters/new}" class="btn btn-primary">Generate New</a>
    </div>
</div>
</body>
</html>
