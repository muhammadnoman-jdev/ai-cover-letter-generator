<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>View — Cover Letter AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="glass-nav">
    <a href="/dashboard" class="brand">✨ Cover Letter AI</a>
    <div class="nav-links">
        <a th:href="@{/cover-letters/new}">Generate</a>
        <a th:href="@{/cover-letters/history}">History</a>
        <a th:href="@{/profile}">Profile</a>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn-danger-glass"
                    style="padding:6px 18px; font-size:0.85rem">Logout</button>
        </form>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-9">

            <div class="glass p-5">
                <h3 class="page-title" th:text="${coverLetter.title}">Title</h3>
                <p class="page-subtitle">
                    <span th:text="${coverLetter.jobTitle}"></span> at
                    <span th:text="${coverLetter.companyName}"></span>
                </p>

                <form th:action="@{/cover-letters/save-edit/{id}(id=${coverLetter.id})}" method="post">

                    <!-- Contact Info -->
                    <div class="glass p-4 mb-4" style="border-radius:14px">
                        <p class="form-label-glass mb-3" style="font-size:0.9rem; font-weight:600">
                            📋 Your Contact Information
                        </p>
                        <div class="row g-2">
                            <div class="col-md-6">
                                <input type="text" name="applicantName"
                                       class="form-control form-control-glass"
                                       placeholder="Full Name"
                                       th:value="${coverLetter.applicantName}"/>
                            </div>
                            <div class="col-md-6">
                                <input type="email" name="applicantEmail"
                                       class="form-control form-control-glass"
                                       placeholder="Email Address"
                                       th:value="${coverLetter.applicantEmail}"/>
                            </div>
                            <div class="col-md-6">
                                <input type="text" name="applicantPhone"
                                       class="form-control form-control-glass"
                                       placeholder="Phone Number"
                                       th:value="${coverLetter.applicantPhone}"/>
                            </div>
                            <div class="col-md-6">
                                <input type="text" name="applicantLinkedin"
                                       class="form-control form-control-glass"
                                       placeholder="LinkedIn URL"
                                       th:value="${coverLetter.applicantLinkedin}"/>
                            </div>
                        </div>
                    </div>

                    <!-- Editable Content -->
                    <div class="mb-4">
                        <label class="form-label-glass mb-2" style="font-size:0.9rem; font-weight:600">
                            ✏️ Cover Letter Content (click to edit)
                        </label>
                        <textarea name="editedContent" class="form-control content-editor"
                                  rows="20"
                                  th:text="${coverLetter.generatedContent}"></textarea>
                    </div>

                    <!-- Action Buttons -->
                    <div class="d-flex flex-wrap gap-2">
                        <button type="submit" class="btn-primary-glass">💾 Save Changes</button>
                        <a th:href="@{/cover-letters/download/{id}(id=${coverLetter.id})}"
                           class="btn-success-glass">⬇️ Download PDF</a>
                        <a th:href="@{/cover-letters/edit/{id}(id=${coverLetter.id})}"
                           class="btn-warning-glass">🔄 Regenerate with AI</a>
                        <a th:href="@{/cover-letters/history}"
                           class="btn-glass">← Back to History</a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
