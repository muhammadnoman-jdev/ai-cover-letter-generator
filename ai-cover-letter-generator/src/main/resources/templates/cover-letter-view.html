<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cover Letter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        #editableContent {
            min-height: 400px;
            font-family: 'Georgia', serif;
            font-size: 14px;
            line-height: 1.8;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            padding: 20px;
            background: white;
            white-space: pre-wrap;
        }
        .contact-bar {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body class="bg-light">
<div class="container mt-4" style="max-width: 800px">

    <h4 th:text="${coverLetter.title}" class="mb-1">Cover Letter Title</h4>
    <p class="text-muted mb-4">
        <span th:text="${coverLetter.jobTitle}"></span> at
        <span th:text="${coverLetter.companyName}"></span>
    </p>

    <form th:action="@{/cover-letters/save-edit/{id}(id=${coverLetter.id})}" method="post">

        <!-- Contact Info Bar -->
        <div class="contact-bar">
            <h6 class="mb-3">Your Contact Information (will appear in PDF header)</h6>
            <div class="row g-2">
                <div class="col-md-6">
                    <input type="text" name="applicantName" class="form-control form-control-sm"
                           placeholder="Full Name"
                           th:value="${coverLetter.applicantName}"/>
                </div>
                <div class="col-md-6">
                    <input type="email" name="applicantEmail" class="form-control form-control-sm"
                           placeholder="Email Address"
                           th:value="${coverLetter.applicantEmail}"/>
                </div>
                <div class="col-md-6">
                    <input type="text" name="applicantPhone" class="form-control form-control-sm"
                           placeholder="Phone Number"
                           th:value="${coverLetter.applicantPhone}"/>
                </div>
                <div class="col-md-6">
                    <input type="text" name="applicantLinkedin" class="form-control form-control-sm"
                           placeholder="LinkedIn URL"
                           th:value="${coverLetter.applicantLinkedin}"/>
                </div>
            </div>
        </div>

        <!-- Editable Cover Letter Content -->
        <div class="mb-3">
            <label class="form-label fw-bold">Cover Letter Content (click to edit)</label>
            <textarea name="editedContent" id="editableContent"
                      class="form-control"
                      rows="20"
                      th:text="${coverLetter.generatedContent}"></textarea>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a th:href="@{/cover-letters/download/{id}(id=${coverLetter.id})}"
               class="btn btn-success">Download PDF</a>
            <a th:href="@{/cover-letters/edit/{id}(id=${coverLetter.id})}"
               class="btn btn-warning">Regenerate with AI</a>
            <a th:href="@{/cover-letters/history}"
               class="btn btn-secondary">Back to History</a>
        </div>

    </form>
</div>
</body>
</html>
