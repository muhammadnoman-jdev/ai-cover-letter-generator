<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register — Cover Letter AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="d-flex align-items-center justify-content-center" style="min-height:100vh; padding:20px">
    <div class="glass-strong p-5" style="width:100%; max-width:460px">

        <div class="text-center mb-4">
            <div style="font-size:2.5rem">🚀</div>
            <h2 class="page-title mt-2">Get Started</h2>
            <p class="page-subtitle">Create your account in seconds</p>
        </div>

        <div th:if="${error}" class="alert-glass-danger" th:text="${error}"></div>

        <form th:action="@{/register}" th:object="${registerRequest}" method="post">
            <div class="mb-3">
                <label class="form-label-glass">Full Name</label>
                <input type="text" th:field="*{name}" class="form-control form-control-glass"
                       placeholder="Muhammad Noman"/>
                <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}"
                      style="color:#fda4af; font-size:0.8rem"></span>
            </div>
            <div class="mb-3">
                <label class="form-label-glass">Email Address</label>
                <input type="email" th:field="*{email}" class="form-control form-control-glass"
                       placeholder="you@example.com"/>
                <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}"
                      style="color:#fda4af; font-size:0.8rem"></span>
            </div>
            <div class="mb-4">
                <label class="form-label-glass">Password</label>
                <input type="password" th:field="*{password}" class="form-control form-control-glass"
                       placeholder="Min 6 characters"/>
                <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}"
                      style="color:#fda4af; font-size:0.8rem"></span>
            </div>
            <button type="submit" class="btn-primary-glass w-100 text-center"
                    style="padding:13px; font-size:1rem; border-radius:14px">
                Create Account →
            </button>
        </form>

        <p class="text-center mt-4" style="color:rgba(255,255,255,0.5); font-size:0.88rem">
            Already have an account?
            <a th:href="@{/login}" style="color:#a78bfa; text-decoration:none">Sign in</a>
        </p>
    </div>
</div>
</body>
</html>
