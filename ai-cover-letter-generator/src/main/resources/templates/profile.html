<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Profile — Cover Letter AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="glass-nav">
    <a href="/dashboard" class="brand">✨ Cover Letter AI</a>
    <div class="nav-links">
        <a th:href="@{/cover-letters/new}">Cover Letter</a>
        <a th:href="@{/cover-letters/history}">History</a>
        <a th:href="@{/profile}">Profile</a>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn-danger-glass"
                    style="padding:6px 18px; font-size:0.85rem">Logout</button>
        </form>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">

            <div class="text-center mb-4">
                <div class="glass-strong d-inline-flex align-items-center justify-content-center"
                     style="width:80px; height:80px; border-radius:50%; font-size:2rem">
                    👤
                </div>
                <h2 class="page-title mt-3 mb-1" th:text="${user.name}">Name</h2>
                <p class="page-subtitle" th:text="${user.email}">email@example.com</p>
            </div>

            <!-- Stats -->
            <div class="glass p-4 mb-4 text-center" style="border-radius:16px">
                <div style="font-size:2rem; font-weight:700; color:#a78bfa" th:text="${totalLetters}">0</div>
                <div style="color:rgba(255,255,255,0.5); font-size:0.85rem">Cover Letters Generated</div>
            </div>

            <div th:if="${param.updated}" class="alert-glass-success">✅ Profile updated successfully!</div>
            <div th:if="${param.passwordChanged}" class="alert-glass-success">✅ Password changed successfully!</div>
            <div th:if="${passwordError}" class="alert-glass-danger" th:text="${passwordError}"></div>

            <!-- Update Profile -->
            <div class="glass p-4 mb-4">
                <h5 style="color:#a78bfa; margin-bottom:18px">📝 Edit Profile</h5>
                <form th:action="@{/profile/update}" th:object="${profileUpdate}" method="post">
                    <div class="mb-3">
                        <label class="form-label-glass">Full Name</label>
                        <input type="text" th:field="*{name}" class="form-control form-control-glass"/>
                    </div>
                    <button type="submit" class="btn-primary-glass">Save Changes</button>
                </form>
            </div>

            <!-- Change Password -->
            <div class="glass p-4">
                <h5 style="color:#a78bfa; margin-bottom:18px">🔒 Change Password</h5>
                <form th:action="@{/profile/change-password}" th:object="${passwordChange}" method="post">
                    <div class="mb-3">
                        <label class="form-label-glass">Current Password</label>
                        <input type="password" th:field="*{currentPassword}" class="form-control form-control-glass"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label-glass">New Password</label>
                        <input type="password" th:field="*{newPassword}" class="form-control form-control-glass"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label-glass">Confirm New Password</label>
                        <input type="password" th:field="*{confirmPassword}" class="form-control form-control-glass"/>
                    </div>
                    <button type="submit" class="btn-warning-glass">Change Password</button>
                </form>
            </div>

        </div>
    </div>
</div>

</body>
</html>
