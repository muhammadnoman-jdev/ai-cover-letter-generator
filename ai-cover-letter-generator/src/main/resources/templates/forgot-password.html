<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Forgot Password — Cover Letter AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="d-flex align-items-center justify-content-center" style="min-height:100vh; padding:20px">
    <div class="glass-strong p-5" style="max-width:440px; width:100%">

        <div class="text-center mb-4">
            <div style="font-size:2.5rem">🔐</div>
            <h2 class="page-title mt-2">Forgot Password</h2>
            <p class="page-subtitle">Enter your email and we'll send a reset link</p>
        </div>

        <div th:if="${error}" class="alert-glass-danger" th:text="${error}"></div>
        <div th:if="${success}" class="alert-glass-success" th:text="${success}"></div>

        <form th:action="@{/forgot-password}" method="post">
            <div class="mb-4">
                <label class="form-label-glass">Email Address</label>
                <input type="email" name="email" class="form-control form-control-glass"
                       placeholder="you@example.com"/>
            </div>
            <button type="submit" class="btn-primary-glass w-100 text-center"
                    style="padding:13px; font-size:1rem; border-radius:14px">
                Send Reset Link →
            </button>
        </form>

        <p class="text-center mt-4" style="color:rgba(255,255,255,0.5); font-size:0.88rem">
            Remember your password?
            <a th:href="@{/login}" style="color:#a78bfa; text-decoration:none">Sign in</a>
        </p>
    </div>
</div>
</body>
</html>
