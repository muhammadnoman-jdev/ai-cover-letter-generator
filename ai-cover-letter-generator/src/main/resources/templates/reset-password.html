<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reset Password — Cover Letter AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="d-flex align-items-center justify-content-center" style="min-height:100vh; padding:20px">
    <div class="glass-strong p-5" style="max-width:440px; width:100%">

        <div class="text-center mb-4">
            <div style="font-size:2.5rem">🔑</div>
            <h2 class="page-title mt-2">Reset Password</h2>
            <p class="page-subtitle">Enter your new password below</p>
        </div>

        <div th:if="${error}" class="alert-glass-danger" th:text="${error}"></div>

        <form th:action="@{/reset-password}" method="post">
            <input type="hidden" name="token" th:value="${token}"/>
            <div class="mb-3">
                <label class="form-label-glass">New Password</label>
                <input type="password" name="password" class="form-control form-control-glass"
                       placeholder="Min 6 characters"/>
            </div>
            <div class="mb-4">
                <label class="form-label-glass">Confirm Password</label>
                <input type="password" name="confirmPassword" class="form-control form-control-glass"
                       placeholder="Repeat password"/>
            </div>
            <button type="submit" class="btn-primary-glass w-100 text-center"
                    style="padding:13px; font-size:1rem; border-radius:14px">
                Reset Password →
            </button>
        </form>
    </div>
</div>
</body>
</html>
