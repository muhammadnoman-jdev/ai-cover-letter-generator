<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Cover Letters</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
<div class="container mt-4">
    <h3 class="mb-4">My Cover Letters</h3>
    <a th:href="@{/cover-letters/new}" class="btn btn-primary mb-3">Generate New</a>

    <div th:if="${letters.empty}" class="alert alert-info">
        No cover letters yet. Generate your first one!
    </div>

    <div class="card mb-3" th:each="letter : ${letters}">
        <div class="card-body d-flex justify-content-between align-items-center">
            <div>
                <h5 class="card-title" th:text="${letter.title}"></h5>
                <p class="card-text text-muted">
                    <span th:text="${letter.jobTitle}"></span> at
                    <span th:text="${letter.companyName}"></span>
                </p>
            </div>
            <div>
                <a th:href="@{/cover-letters/{id}(id=${letter.id})}" class="btn btn-outline-primary btn-sm">View</a>
                <form th:action="@{/cover-letters/delete/{id}(id=${letter.id})}" method="post" style="display:inline">
                    <button type="submit" class="btn btn-outline-danger btn-sm"
                            onclick="return confirm('Delete this cover letter?')">Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
