<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>History — Cover Letter AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="glass-nav">
    <a href="/dashboard" class="brand">✨ Cover Letter AI</a>
    <div class="nav-links">
        <a th:href="@{/cover-letters/new}">Generate</a>
        <a th:href="@{/profile}">Profile</a>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn-danger-glass"
                    style="padding:6px 18px; font-size:0.85rem">Logout</button>
        </form>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-9">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="page-title mb-1">My Cover Letters</h2>
                    <p class="page-subtitle mb-0">All your generated letters in one place</p>
                </div>
                <a th:href="@{/cover-letters/new}" class="btn-primary-glass">+ Generate New</a>
            </div>

            <div th:if="${letters.empty}" class="glass p-5 text-center">
                <div style="font-size:3rem; margin-bottom:16px">📭</div>
                <p style="color:rgba(255,255,255,0.5)">No cover letters yet.</p>
                <a th:href="@{/cover-letters/new}" class="btn-primary-glass mt-3">
                    Generate Your First One
                </a>
            </div>

            <div th:each="letter : ${letters}" class="letter-card">
                <div>
                    <div class="letter-title" th:text="${letter.title}">Title</div>
                    <div class="letter-meta">
                        <span th:text="${letter.jobTitle}"></span> at
                        <span th:text="${letter.companyName}"></span>
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <a th:href="@{/cover-letters/{id}(id=${letter.id})}"
                       class="btn-glass" style="padding:7px 16px; font-size:0.82rem">View</a>
                    <a th:href="@{/cover-letters/edit/{id}(id=${letter.id})}"
                       class="btn-warning-glass" style="padding:7px 16px; font-size:0.82rem">Edit</a>
                    <form th:action="@{/cover-letters/delete/{id}(id=${letter.id})}"
                          method="post" style="display:inline">
                        <button type="submit" class="btn-danger-glass"
                                style="padding:7px 16px; font-size:0.82rem"
                                onclick="return confirm('Delete this cover letter?')">Delete</button>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>
</body>
</html>
