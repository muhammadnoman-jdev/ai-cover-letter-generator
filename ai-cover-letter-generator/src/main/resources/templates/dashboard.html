<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 600px">
    <h3 class="mb-4">Welcome to Cover Letter Generator</h3>
    <div class="d-grid gap-3">
        <a th:href="@{/cover-letters/new}" class="btn btn-primary btn-lg">Generate New Cover Letter</a>
        <a th:href="@{/cover-letters/history}" class="btn btn-outline-secondary btn-lg">View My History</a>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-danger btn-lg w-100">Logout</button>
        </form>
    </div>
</div>
</body>
</html>
