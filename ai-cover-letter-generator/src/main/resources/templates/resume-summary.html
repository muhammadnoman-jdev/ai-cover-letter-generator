<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Resume Summary — Cover Letter AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="glass-nav">
    <a href="/dashboard" class="brand">✨ Cover Letter AI</a>
    <div class="nav-links">
        <a th:href="@{/cover-letters/new}">Cover Letter</a>
        <a th:href="@{/tools/interview-questions}">Interview Prep</a>
        <a th:href="@{/cover-letters/history}">History</a>
        <a th:href="@{/profile}">Profile</a>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn-danger-glass"
                    style="padding:6px 18px; font-size:0.85rem">Logout</button>
        </form>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="glass p-5">
                <h2 class="page-title">Resume Summary Generator</h2>
                <p class="page-subtitle">Get a professional summary for your resume in seconds</p>

                <form th:action="@{/tools/resume-summary}" method="post">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label-glass">Your Name</label>
                            <input type="text" name="name" class="form-control form-control-glass"
                                   placeholder="Muhammad Noman"
                                   th:value="${name}"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label-glass">Target Role</label>
                            <input type="text" name="targetRole" class="form-control form-control-glass"
                                   placeholder="Java Backend Developer"
                                   th:value="${targetRole}"/>
                        </div>
                        <div class="col-12">
                            <label class="form-label-glass">Your Skills</label>
                            <textarea name="skills" class="form-control form-control-glass" rows="3"
                                      placeholder="Spring Boot, REST APIs, MySQL, Spring Security, Docker..."
                                      th:text="${skills}"></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label-glass">Your Experience</label>
                            <textarea name="experience" class="form-control form-control-glass" rows="4"
                                      placeholder="3 month internship at XYZ building REST APIs, 3 months at ABC as Associate SE..."
                                      th:text="${experience}"></textarea>
                        </div>
                        <div class="col-12 mt-2">
                            <button type="submit" class="btn-primary-glass w-100 text-center"
                                    style="padding:14px; font-size:1rem; border-radius:14px">
                                ✨ Generate Resume Summary
                            </button>
                        </div>
                    </div>
                </form>

                <!-- Result -->
                <div th:if="${summary}" class="mt-4">
                    <div style="height:1px; background:rgba(255,255,255,0.1); margin-bottom:24px"></div>
                    <h5 style="color:#a78bfa; margin-bottom:16px">✅ Your Resume Summary</h5>
                    <div class="glass p-4" style="border-radius:14px">
                        <p style="color:#e2e8f0; line-height:1.8; font-size:0.95rem"
                           th:text="${summary}"></p>
                    </div>
                    <div class="mt-3 d-flex gap-2">
                        <button onclick="copyToClipboard()" class="btn-success-glass"
                                style="font-size:0.85rem; padding:8px 18px">
                            📋 Copy to Clipboard
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function copyToClipboard() {
    const text = `[[${summary}]]`;
    navigator.clipboard.writeText(document.querySelector('[th\\:text="${summary}"]').innerText)
        .then(() => alert('Copied to clipboard!'));
}
</script>

</body>
</html>
