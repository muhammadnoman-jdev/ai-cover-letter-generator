<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Generate — Cover Letter AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="glass-nav">
    <a href="/dashboard" class="brand">✨ Cover Letter AI</a>
    <div class="nav-links">
        <a th:href="@{/cover-letters/history}">History</a>
        <a th:href="@{/profile}">Profile</a>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn-danger-glass"
                    style="padding:6px 18px; font-size:0.85rem">Logout</button>
        </form>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="glass p-5">
                <h2 class="page-title">Generate Cover Letter</h2>
                <p class="page-subtitle">Fill in the details below and let AI do the rest</p>

                <form th:action="@{/cover-letters/generate}"
                      th:object="${coverLetterRequest}" method="post">

                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label-glass">Title (for your reference)</label>
                            <input type="text" th:field="*{title}"
                                   class="form-control form-control-glass"
                                   placeholder="e.g. Java Dev - Systems Limited - June 2026"/>
                            <span th:if="${#fields.hasErrors('title')}" th:errors="*{title}"
                                  style="color:#fda4af; font-size:0.8rem"></span>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label-glass">Job Title</label>
                            <input type="text" th:field="*{jobTitle}"
                                   class="form-control form-control-glass"
                                   placeholder="Java Backend Developer"/>
                            <span th:if="${#fields.hasErrors('jobTitle')}" th:errors="*{jobTitle}"
                                  style="color:#fda4af; font-size:0.8rem"></span>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label-glass">Company Name</label>
                            <input type="text" th:field="*{companyName}"
                                   class="form-control form-control-glass"
                                   placeholder="Systems Limited"/>
                            <span th:if="${#fields.hasErrors('companyName')}" th:errors="*{companyName}"
                                  style="color:#fda4af; font-size:0.8rem"></span>
                        </div>

                        <div class="col-12">
                            <label class="form-label-glass">Your Skills</label>
                            <textarea th:field="*{skills}" class="form-control form-control-glass"
                                      rows="3"
                                      placeholder="Spring Boot, REST APIs, MySQL, Spring Security..."></textarea>
                            <span th:if="${#fields.hasErrors('skills')}" th:errors="*{skills}"
                                  style="color:#fda4af; font-size:0.8rem"></span>
                        </div>

                        <div class="col-12">
                            <label class="form-label-glass">Your Experience</label>
                            <textarea th:field="*{experience}" class="form-control form-control-glass"
                                      rows="3"
                                      placeholder="6 months internship at XYZ, built REST APIs..."></textarea>
                            <span th:if="${#fields.hasErrors('experience')}" th:errors="*{experience}"
                                  style="color:#fda4af; font-size:0.8rem"></span>
                        </div>

                        <div class="col-12">
                            <label class="form-label-glass">Job Description</label>
                            <textarea th:field="*{jobDescription}" class="form-control form-control-glass"
                                      rows="4"
                                      placeholder="Paste the job description here..."></textarea>
                            <span th:if="${#fields.hasErrors('jobDescription')}" th:errors="*{jobDescription}"
                                  style="color:#fda4af; font-size:0.8rem"></span>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label-glass">Tone</label>
                            <select th:field="*{tone}" class="form-control form-control-glass">
                                <option value="">-- Select Tone --</option>
                                <option value="Professional">Professional</option>
                                <option value="Friendly">Friendly</option>
                                <option value="Confident">Confident</option>
                                <option value="Enthusiastic">Enthusiastic</option>
                            </select>
                            <span th:if="${#fields.hasErrors('tone')}" th:errors="*{tone}"
                                  style="color:#fda4af; font-size:0.8rem"></span>
                        </div>

                        <div class="col-12 mt-2">
                            <button type="submit" class="btn-primary-glass w-100 text-center"
                                    style="padding:14px; font-size:1rem; border-radius:14px">
                                ✨ Generate Cover Letter
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
