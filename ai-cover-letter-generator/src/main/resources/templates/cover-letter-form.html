<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Generate Cover Letter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
<div class="container mt-4" style="max-width: 700px">
    <h3 class="mb-4">Generate Cover Letter</h3>
    <form th:action="@{/cover-letters/generate}" th:object="${coverLetterRequest}" method="post">

        <div class="mb-3">
            <label>Title (for your reference)</label>
            <input type="text" th:field="*{title}" class="form-control"/>
            <span th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="text-danger small"></span>
        </div>
        <div class="mb-3">
            <label>Job Title</label>
            <input type="text" th:field="*{jobTitle}" class="form-control"/>
            <span th:if="${#fields.hasErrors('jobTitle')}" th:errors="*{jobTitle}" class="text-danger small"></span>
        </div>
        <div class="mb-3">
            <label>Company Name</label>
            <input type="text" th:field="*{companyName}" class="form-control"/>
            <span th:if="${#fields.hasErrors('companyName')}" th:errors="*{companyName}" class="text-danger small"></span>
        </div>
        <div class="mb-3">
            <label>Your Skills</label>
            <textarea th:field="*{skills}" class="form-control" rows="3"></textarea>
            <span th:if="${#fields.hasErrors('skills')}" th:errors="*{skills}" class="text-danger small"></span>
        </div>
        <div class="mb-3">
            <label>Your Experience</label>
            <textarea th:field="*{experience}" class="form-control" rows="3"></textarea>
            <span th:if="${#fields.hasErrors('experience')}" th:errors="*{experience}" class="text-danger small"></span>
        </div>
        <div class="mb-3">
            <label>Job Description</label>
            <textarea th:field="*{jobDescription}" class="form-control" rows="4"></textarea>
            <span th:if="${#fields.hasErrors('jobDescription')}" th:errors="*{jobDescription}" class="text-danger small"></span>
        </div>
        <div class="mb-3">
            <label>Tone</label>
            <select th:field="*{tone}" class="form-select">
                <option value="">-- Select Tone --</option>
                <option value="Professional">Professional</option>
                <option value="Friendly">Friendly</option>
                <option value="Confident">Confident</option>
                <option value="Enthusiastic">Enthusiastic</option>
            </select>
            <span th:if="${#fields.hasErrors('tone')}" th:errors="*{tone}" class="text-danger small"></span>
        </div>

        <button type="submit" class="btn btn-primary w-100">Generate Cover Letter</button>
    </form>
</div>
</body>
</html>
