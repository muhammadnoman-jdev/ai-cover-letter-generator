version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: coverletter_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: coverletter_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - coverletter_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: coverletter_app
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:mysql://mysql:3306/coverletter_db
      - DB_USERNAME=root
      - DB_PASSWORD=root
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - coverletter_network

networks:
  coverletter_network:
    driver: bridge

volumes:
  mysql_data: